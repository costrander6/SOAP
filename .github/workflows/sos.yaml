name: Run SOAP on SOAP
on:
    workflow_dispatch:
        inputs:
            security_level:
                required: true
                type: choice
                options:
                - fundamental
                - essential
                - advanced
    pull_request:
        types: [opened, synchronize, reopened]
        branches:
        - main

jobs:
    run-soap:
        runs-on: ubuntu-latest
        steps:
            - uses: costrander6/SOAP@ddbe06e5ca28054dee60ba023499c23f7c02840f # no version
              with:
                security_level: ${{ github.event_name == 'pull_request' && 'advanced' || inputs.security_level }}

            - name: Read scanner output
              run: |
                cat actionlint-out.json
                cat poutine-out.json
                cat semgrep-out.json