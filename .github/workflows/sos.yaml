name: Run SOAP on SOAP
on:
    workflow_dispatch:
        inputs:
            security_level:
                required: true
                type: choice
                options:
                - fundamental
                - essential
                - advanced
    pull_request:
        types: [opened, synchronize, reopened]
        branches:
        - main

jobs:
    run-soap:
        runs-on: ubuntu-latest
        steps:
            - uses: costrander6/SOAP@88f5cd1feee2ce71d08dd44018e59501bed121b3 #no version
              with:
                security_level: ${{ github.event_name == 'pull_request' && 'advanced' || inputs.security_level }}