name: Run SOAP on SOAP
on:
    workflow_dispatch:
        inputs:
            security_level:
                required: true
                type: choice
                options:
                - fundamental
                - essential
                - advanced
    pull_request:
        types: [opened, synchronize, reopened]
        branches:
        - main

jobs:
    run-soap:
        runs-on: ubuntu-latest
        steps:
            - uses: costrander6/SOAP@ada4f08cafa7b911567c8b806c12c61a501b869a # no version
              with:
                security_level: ${{ github.event_name == 'pull_request' && 'advanced' || inputs.security_level }}