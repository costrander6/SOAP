name: Run SOAP on SOAP
on:
    workflow_dispatch:
        inputs:
            security_level:
                required: true
                type: choice
                options:
                - fundamental
                - essential
                - advanced
    pull_request:
        types: [opened, synchronize, reopened]
        branches:
        - main

jobs:
    run-soap:
        runs-on: ubuntu-latest
        steps:
            - uses: costrander6/SOAP@569761bd47b4ee4179b2f43a3546128ae9bfb3b1 # v3.0.0
              with:
                security_level: ${{ github.event_name == 'pull_request' && 'advanced' || inputs.security_level }}

            - name: Read scanner output
              run: |
                echo actionlint; cat actionlint-out.json <(echo)
                echo poutine; cat poutine-out.json <(echo)
                echo semgrep; cat semgrep-out.json <(echo)