name: Run SOAP on SOAP
on:
    workflow_dispatch:
        inputs:
            security_level:
                required: true
                type: choice
                options:
                - fundamental
                - essential
                - advanced
    pull_request:
        types: [opened, synchronize, reopened]
        branches:
        - main

jobs:
    run-soap:
        runs-on: ubuntu-latest
        steps:
            - uses: costrander6/SOAP@7129f0f4a918a7c0e1c3964d0fd84161a0466954 # v6.0.3
              with:
                security_level: ${{ github.event_name == 'pull_request' && 'advanced' || inputs.security_level }}
                api_key: ${{ secrets.SOAP_API_KEY }}

            - name: Read scanner output
              run: |
                echo actionlint; cat actionlint-out.json <(echo)
                echo poutine; cat poutine-out.json <(echo)
                echo frizbee; cat frizbee-out.jsonl <(echo) || true
                echo semgrep; cat semgrep-out.json <(echo) || true