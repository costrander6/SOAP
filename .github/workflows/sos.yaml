name: Run SOAP on SOAP
on:
    workflow_dispatch:
        inputs:
            security_level:
                required: true
                type: choice
                options:
                - fundamental
                - essential
                - advanced
    pull_request:
        types: [opened, synchronize, reopened]
        branches:
        - main

jobs:
    run-soap:
        runs-on: ubuntu-latest
        steps:
            - uses: costrander6/SOAP@4b39528c06d505a1dbcc5d9410647192803d3cf7 # v2.0.0
              with:
                security_level: ${{ github.event_name == 'pull_request' && 'advanced' || inputs.security_level }}