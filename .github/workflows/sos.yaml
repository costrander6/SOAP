name: Run SOAP on SOAP
on:
    workflow_dispatch:
        inputs:
            security_level:
                required: true
                type: choice
                options:
                - fundamental
                - essential
                - advanced
    pull_request:
        types: [opened, synchronize, reopened]
        branches:
        - main

jobs:
    run-soap:
        runs-on: ubuntu-latest
        steps:
            - uses: costrander6/SOAP@27f540ed61d5b2588d24eb0835453244fb467cbf # v1.2.1
              with:
                security_level: ${{ github.event_name == 'pull_request' && 'advanced' || inputs.security_level }}