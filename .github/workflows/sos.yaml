name: Run SOAP on SOAP
on:
    workflow_dispatch:
        inputs:
            security_level:
                required: true
                type: choice
                options:
                - fundamental
                - essential
                - advanced
    pull_request:
        types: [opened, synchronize, reopened]
        branches:
        - main

jobs:
    run-soap:
        runs-on: ubuntu-latest
        steps:
            - uses: costrander6/SOAP@107fee1dcb3437b61a9aca4270fefe65704b4325 #v1.0.4
              with:
                security_level: ${{ github.event_name == 'pull_request' && 'advanced' || inputs.security_level }}