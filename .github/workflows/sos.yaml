name: Run SOAP on SOAP
on:
    workflow_dispatch:
        inputs:
            security_level:
                required: true
                type: choice
                options:
                - fundamental
                - essential
                - advanced
    pull_request:
        types: [opened, synchronize, reopened]
        branches:
        - main

jobs:
    run-soap:
        runs-on: ubuntu-latest
        steps:
            - uses: costrander6/SOAP@000db0b90896cb80cf9eb39b490f590b085bd3b3 #v1.0.2
              with:
                security_level: ${{ github.event_name == 'pull_request' && 'advanced' || inputs.security_level }}