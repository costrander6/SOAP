name: Run SOAP on SOAP
on:
    workflow_dispatch:
        inputs:
            security_level:
                required: true
                type: choice
                options:
                - fundamental
                - essential
                - advanced
    pull_request:
        types: [opened, synchronize, reopened]
        branches:
        - main

jobs:
    run-soap:
        runs-on: ubuntu-latest
        steps:
            - uses: costrander6/SOAP@8d942c3b892c9c1be68b0b799d64dd3b81872b6f #no version
              with:
                security_level: ${{ github.event_name == 'pull_request' && 'advanced' || inputs.security_level }}