name: Run SOAP on SOAP
on:
    workflow_dispatch:
        inputs:
            security_level:
                required: true
                type: choice
                options:
                - fundamental
                - essential
                - advanced
    pull_request:
        types: [opened, synchronize, reopened]
        branches:
        - main

jobs:
    run-soap:
        runs-on: ubuntu-latest
        steps:
            - uses: costrander6/SOAP@c53ded4cc33e7b8c1ecb64cff2621cca0bb72862 # v1.2.2
              with:
                security_level: ${{ github.event_name == 'pull_request' && 'advanced' || inputs.security_level }}