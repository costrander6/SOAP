name: SOAP
description: The Scanner Orchestration & Analysis Pipeline orchestrates multiple workflow scanning tools depending on the provided security level.

inputs:
  security_level:
    required: true
    type: choice
    options:
    - fundamental
    - essential
    - advanced
  target:
    required: false
    type: string
    default: '.github/workflows'

runs:
  using: 'composite'  
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set Versions and URLs
      run: |
        ACTIONLINT_VERSION="v1.0.0-soap"
        ACTIONLINT_PACKAGE_VERSION="${ACTIONLINT_VERSION#v}"

        POUTINE_VERSION="v0.0.2-soap"

        FRIZBEE_VERSION="v0.0.3-soap"
        FRIZBEE_PACKAGE_VERSION="${FRIZBEE_VERSION#v}"
        
        SEMGREP_VERSION="v0.1.1-soap"

        echo "ACTIONLINT_PACKAGE_VERSION=${ACTIONLINT_PACKAGE_VERSION}" >> $GITHUB_ENV
        echo "ACTIONLINT_URL=https://github.com/costrander6/actionlint-for-SOAP/releases/download/${ACTIONLINT_VERSION}/actionlint-for-SOAP_${ACTIONLINT_PACKAGE_VERSION}_linux_amd64.tar.gz" >> $GITHUB_ENV

        echo "POUTINE_VERSION=${POUTINE_VERSION}" >> $GITHUB_ENV
        echo "POUTINE_URL=https://github.com/costrander6/poutine-for-SOAP/releases/download/${POUTINE_VERSION}/poutine_Linux_x86_64.tar.gz" >> $GITHUB_ENV

        echo "FRIZBEE_PACKAGE_VERSION=${FRIZBEE_PACKAGE_VERSION}" >> $GITHUB_ENV
        echo "FRIZBEE_URL=https://github.com/costrander6/frizbee-for-SOAP/releases/download/${FRIZBEE_VERSION}/frizbee_${FRIZBEE_PACKAGE_VERSION}_linux_amd64.tar.gz" >> $GITHUB_ENV

        echo "SEM_URL=https://github.com/costrander6/semgrep-for-SOAP/releases/download/${SEMGREP_VERSION}/semgrep-1.164.0-cp310.cp311.cp312.cp313.cp314.py310.py311.py312.py313.py314-none-manylinux_2_34_x86_64.whl" >> $GITHUB_ENV
      shell: bash

    - name: Run actionlint
      continue-on-error: true
      run: |
        wget $ACTIONLINT_URL
        tar -xvf actionlint-for-SOAP_${ACTIONLINT_PACKAGE_VERSION}_linux_amd64.tar.gz
        
        TARGET="${{ inputs.target }}"
        if [[ "$TARGET" != *.yml && "$TARGET" != *.yaml ]]; then
          TARGET="${TARGET%/}/*"
        fi

        ./actionlint-for-SOAP -format "$(cat $GITHUB_ACTION_PATH/actionlint_soap_template.txt)" $TARGET
      shell: bash

    - name: Run poutine
      run: |
        wget $POUTINE_URL
        tar -xvf poutine_Linux_x86_64.tar.gz

        TARGET="${{ inputs.target }}"
        TARGET="${TARGET%/}"

        if [[ "$TARGET" != ".github/workflows" ]]; then
          mkdir -p .github/workflows
          if [[ -f "$TARGET" ]]; then
            cp "$TARGET" .github/workflows/
          elif [[ -d "$TARGET" ]]; then
            cp "$TARGET"/* .github/workflows/
          else
            cp $TARGET .github/workflows/
          fi
        fi

        ./poutine analyze_local . --disable-version-check
      shell: bash

    - name: Run frizbee
      if: inputs.security_level == 'essential' || inputs.security_level == 'advanced'
      run: |
        wget $FRIZBEE_URL
        tar -xvf frizbee_${FRIZBEE_PACKAGE_VERSION}_linux_amd64.tar.gz

        if [[ -f "$TARGET" ]]; then
          ./frizbee actions "$TARGET" --dry-run
        else
          ./frizbee actions .github/workflows --dry-run
        fi
      shell: bash

    - name: Run semgrep
      if: inputs.security_level == 'advanced'
      run: |
        sudo apt-get update
        sudo apt-get install -y libev4 libpcre3
        pip install $SEM_URL
        semgrep scan ${{ inputs.target }}
      shell: bash
